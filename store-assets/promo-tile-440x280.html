<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
  }

  .tile {
    width: 440px; height: 280px;
    background: linear-gradient(135deg, #0d1117 0%, #0f1924 50%, #0d1117 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* Radial glow */
  .tile::before {
    content: '';
    position: absolute;
    width: 500px; height: 300px;
    background: radial-gradient(ellipse at center, rgba(244,121,32,0.18) 0%, transparent 65%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  /* Grid lines */
  .tile::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .content { position: relative; z-index: 2; text-align: center; }

  .logo-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 14px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #f47920, #d4610a);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(244,121,32,0.5), 0 0 0 1px rgba(244,121,32,0.3);
  }

  .brand {
    font-size: 32px; font-weight: 900; letter-spacing: -0.03em;
    background: linear-gradient(90deg, #ff9340, #f47920);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .tagline {
    font-size: 13.5px; color: #94a3b8;
    margin-bottom: 22px; letter-spacing: 0.01em;
    font-weight: 400;
  }

  .pills {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }

  .pill {
    padding: 5px 13px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
  }
  .pill-orange { background: rgba(244,121,32,0.15); border: 1px solid rgba(244,121,32,0.35); color: #ff9340; }
  .pill-green  { background: rgba(34,197,94,0.12);  border: 1px solid rgba(34,197,94,0.3);  color: #4ade80; }
  .pill-blue   { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
  .pill-yellow { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }

  /* Corner accent cards */
  .corner-card {
    position: absolute; z-index: 2;
    background: rgba(22,27,34,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 8px 12px;
    backdrop-filter: blur(8px);
  }
  .corner-tl { top: 16px; left: 16px; }
  .corner-br { bottom: 16px; right: 16px; }

  .mini-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .mini-value { font-size: 13px; font-weight: 700; }
  .green { color: #4ade80; }
  .orange { color: #ff9340; }

  .score-ring {
    position: absolute; top: 16px; right: 16px; z-index: 2;
    width: 52px; height: 52px;
  }
</style>
</head>
<body>
<div class="tile">

  <!-- Corner cards -->
  <div class="corner-card corner-tl">
    <div class="mini-label">Cena spremenjena</div>
    <div class="mini-value green">▼ 1.200 €</div>
  </div>

  <div class="corner-card corner-br">
    <div class="mini-label">Oglas aktiven</div>
    <div class="mini-value orange">● Sledim 24 vozilom</div>
  </div>

  <!-- Score ring top-right -->
  <svg class="score-ring" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
    <circle cx="18" cy="18" r="15.9" fill="none" stroke="#22c55e" stroke-width="3"
      stroke-dasharray="99.9" stroke-dashoffset="28" stroke-linecap="round"
      transform="rotate(-90 18 18)"/>
    <text x="18" y="22" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="800" font-family="sans-serif">72</text>
  </svg>

  <!-- Main content -->
  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="brand">AvtoNetGaraža</div>
    </div>

    <div class="tagline">Shranjujte · Sledite cenam · Analizirajte oglase</div>

    <div class="pills">
      <span class="pill pill-orange">Shrani vozilo</span>
      <span class="pill pill-green">Sledenje cenam</span>
      <span class="pill pill-blue">Pametni Svetovalec</span>
      <span class="pill pill-yellow">Obvestila</span>
    </div>
  </div>

</div>
</body>
</html>
