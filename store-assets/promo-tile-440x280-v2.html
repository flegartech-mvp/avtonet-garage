<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0b1220;
  }
  body {
    background:
      radial-gradient(circle at 16% 20%, rgba(244,121,32,0.34), transparent 32%),
      radial-gradient(circle at 84% 72%, rgba(59,130,246,0.16), transparent 28%),
      linear-gradient(145deg, #0b1220 0%, #111a2b 52%, #0b1220 100%);
    color: #f8fafc;
  }
  .tile {
    position: relative;
    width: 440px;
    height: 280px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .tile::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 34px 34px;
    opacity: 0.35;
  }
  .eyebrow {
    position: absolute;
    top: 14px;
    left: 16px;
    z-index: 3;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(15,23,42,0.76);
    border: 1px solid rgba(255,255,255,0.08);
    color: #cbd5e1;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .left {
    position: absolute;
    left: 16px;
    top: 54px;
    width: 208px;
    z-index: 3;
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .logo-box {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff9b4a, #f47920 58%, #d9640f 100%);
    box-shadow: 0 10px 30px rgba(244,121,32,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
  }
  .brand {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #ff9b4a;
  }
  h1 {
    font-size: 21px;
    line-height: 1.02;
    font-weight: 900;
    letter-spacing: -0.045em;
    margin-bottom: 10px;
  }
  .sub {
    color: #cbd5e1;
    font-size: 11px;
    line-height: 1.45;
    max-width: 190px;
  }
  .features {
    position: absolute;
    left: 16px;
    bottom: 16px;
    z-index: 3;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    width: 210px;
  }
  .feature {
    padding: 7px 9px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
  }
  .feature.orange { background: rgba(244,121,32,0.14); color: #ff9b4a; border-color: rgba(244,121,32,0.35); }
  .feature.green { background: rgba(34,197,94,0.12); color: #4ade80; border-color: rgba(34,197,94,0.28); }
  .feature.blue { background: rgba(59,130,246,0.12); color: #7cc3ff; border-color: rgba(59,130,246,0.28); }
  .visual {
    position: absolute;
    right: 14px;
    top: 34px;
    width: 190px;
    height: 212px;
    z-index: 2;
  }
  .phone-shell {
    position: absolute;
    right: 4px;
    top: 14px;
    width: 160px;
    height: 196px;
    border-radius: 28px;
    background: linear-gradient(165deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06));
    transform: rotate(7deg);
  }
  .shot {
    position: absolute;
    right: 16px;
    top: 26px;
    width: 142px;
    height: 174px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 24px 44px rgba(2,6,23,0.55);
    transform: rotate(7deg);
    background: #101826;
  }
  .shot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left top;
    display: block;
  }
  .chip {
    position: absolute;
    z-index: 4;
    padding: 8px 10px;
    border-radius: 14px;
    background: rgba(15,23,42,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 14px 30px rgba(2,6,23,0.35);
  }
  .chip.price {
    top: 0;
    right: 80px;
  }
  .chip.save {
    right: 0;
    bottom: 2px;
  }
  .chip-label {
    font-size: 8px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .chip-value {
    font-size: 11px;
    font-weight: 800;
  }
  .green-text { color: #4ade80; }
  .orange-text { color: #ff9b4a; }
</style>
</head>
<body>
  <div class="tile">
    <div class="eyebrow">Chrome razsiritev za avto.net</div>

    <div class="left">
      <div class="brand-row">
        <div class="logo-box">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="1.5" y="4" width="14.5" height="11" rx="2"></rect>
            <path d="M16 8h3.2l3.3 3.2V15H16"></path>
            <circle cx="6" cy="17.5" r="2.2"></circle>
            <circle cx="18.2" cy="17.5" r="2.2"></circle>
          </svg>
        </div>
        <div class="brand">AvtoNetGaraza</div>
      </div>
      <h1>Shrani oglase in spremljaj cene.</h1>
      <div class="sub">Garage za avto.net z obvestili, opombami in hitrim pregledom zanimivih vozil.</div>
    </div>

    <div class="visual">
      <div class="phone-shell"></div>
      <div class="chip price">
        <div class="chip-label">Cena dol</div>
        <div class="chip-value green-text">-1.200 EUR</div>
      </div>
      <div class="shot">
        <img src="dashboard-source-1280x800.png" alt="AvtoNetGaraza dashboard">
      </div>
      <div class="chip save">
        <div class="chip-label">Spremljano</div>
        <div class="chip-value orange-text">24 vozil</div>
      </div>
    </div>

    <div class="features">
      <span class="feature orange">Shrani</span>
      <span class="feature green">Sledenje cenam</span>
      <span class="feature blue">Obvestila</span>
    </div>
  </div>
</body>
</html>
