name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: node scripts/package-extension.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: avtonet-garaza-extension
          path: avtonet-garaza-*.zip
