name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate extension
        run: npm run validate

      - name: Package ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd dist && zip -r "../avtonet-garaza-${VERSION}.zip" .
          echo "ZIP=avtonet-garaza-${VERSION}.zip" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          ## AvtoNetGaraža v${VERSION}

          ### Install
          1. Download \`avtonet-garaza-${VERSION}.zip\`
          2. Unzip it
          3. Open \`chrome://extensions\`, enable **Developer mode**
          4. Click **Load unpacked** → select the unzipped folder
          EOF
          gh release create "$GITHUB_REF_NAME" "$ZIP" \
            --title "AvtoNetGaraža v${VERSION}" \
            --notes-file release-notes.md
